# QMaxent is a QGIS plugin — it is NOT distributed as a PyPI package.
# The QGIS plugin repository installs it directly from the published
# ZIP, and runtime dependencies are managed by core/venv_manager.py
# at first launch.
#
# This pyproject.toml exists only to configure development tooling
# (pytest, ruff, coverage). It is intentionally project-name-less so
# that no one accidentally tries `pip install .` on a QGIS plugin
# tree (which would silently land the source under site-packages and
# bypass QGIS entirely).

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
]
filterwarnings = [
    # rasterio + numpy 2.x emits a CRS deprecation we don't own.
    "ignore::DeprecationWarning:rasterio",
]
markers = [
    "needs_elapid: requires the elapid Python package",
    "needs_rasterio: requires the rasterio Python package",
    "needs_sklearn: requires the scikit-learn Python package",
]

[tool.coverage.run]
branch = true
source = ["bridge", "core", "workers"]
omit = [
    # UI / Qt code paths are validated outside CI (see tests/README.md).
    "dialogs/*",
    "qmaxent_plugin.py",
    "i18n/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
show_missing = true
skip_empty = true

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["i18n/lang_ko.py"]  # auto-generated translations

[tool.ruff.lint]
# Conservative ruleset — we want signal, not noise.
select = ["E", "F", "W", "I", "B", "UP", "SIM"]
ignore = [
    # Formatter handles wrapping; we don't enforce line length here.
    "E501",
    # `Default(arg=Func())` is the Qt slot idiom — frequent in dialogs / workers.
    "B008",
    # One-line statements / semicolon joins. Existing v0.1.7 code uses these in
    # a few places for brevity; they don't affect correctness or readability
    # in those spots and the formatter already handles wrapping decisions.
    "E701",
    "E702",
    # Single-letter variable names like `l` (layer), `I` (intensity), `O` (origin)
    # appear in numerical / geospatial code as conventional names matching the
    # math notation the surrounding comments cite. We treat them as part of the
    # domain vocabulary rather than ambiguous identifiers.
    "E741",
    # `zip(a, b)` without `strict=` — `strict=` is Python 3.10+. QGIS 3.44 ships
    # Python 3.9 in some distribution channels, and we don't want lint to gate
    # that compatibility decision.
    "B905",
    # pyupgrade modernization (PEP 604/585 type hints, `dict`/`list` lowercase,
    # etc.) — stylistic-only; flipping these would create a noisy diff across
    # the entire codebase without behavioural benefit, and some changes would
    # require a `from __future__ import annotations` audit we haven't done.
    "UP",
    # Code-simplification suggestions (ternary expressions, contextlib.suppress,
    # dict.get default omissions, etc.) — stylistic.
    "SIM",
]
