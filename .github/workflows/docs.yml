name: Build manual

on:
  push:
    branches: [main]
    paths:
      - 'manual/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: manual/requirements.txt

      - name: Install Python dependencies
        run: pip install -r manual/requirements.txt

      # WeasyPrint (used by mkdocs-with-pdf) needs Pango/Cairo + CJK fonts.
      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 \
            libcairo2 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info \
            fonts-noto fonts-noto-cjk fonts-jetbrains-mono

      - name: Build the manual (HTML site, EN + KO)
        run: |
          cd manual
          mkdocs build --strict --site-dir ../docs/manual

      - name: Build the English PDF
        env:
          ENABLE_PDF_EXPORT: "1"
        run: |
          cd manual
          mkdocs build -f mkdocs.pdf.en.yml
          rm -rf .pdf-build-en

      - name: Build the Korean PDF
        env:
          ENABLE_PDF_EXPORT: "1"
        run: |
          cd manual
          # docs/ko/ has no images/ of its own — borrow the EN tree's
          # assets temporarily so relative `images/...` links resolve.
          cp -r docs/images       docs/ko/images
          cp -r docs/stylesheets  docs/ko/stylesheets
          mkdocs build -f mkdocs.pdf.ko.yml
          rm -rf docs/ko/images docs/ko/stylesheets .pdf-build-ko

      - name: Upload PDFs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qmaxent-manual-pdfs
          path: |
            docs/manual/qmaxent-manual-en.pdf
            docs/manual/qmaxent-manual-ko.pdf
          retention-days: 90

      - name: Commit rebuilt manual (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/manual
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: rebuild manual [skip ci]"
            git push
          fi

      # When pushed by a release tag (vX.Y.Z), also attach the PDFs to the
      # GitHub Release so users have a stable, versioned download URL.
      - name: Attach PDFs to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            docs/manual/qmaxent-manual-en.pdf
            docs/manual/qmaxent-manual-ko.pdf
          fail_on_unmatched_files: true
