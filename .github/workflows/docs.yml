name: Build manual

on:
  push:
    branches: [main]
    paths:
      - 'manual/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: manual/requirements.txt

      - name: Install dependencies
        run: pip install -r manual/requirements.txt

      - name: Build the manual
        run: |
          cd manual
          mkdocs build --strict --site-dir ../docs/manual

      - name: Commit rebuilt manual (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/manual
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: rebuild manual [skip ci]"
            git push
          fi
