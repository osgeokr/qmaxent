name: CI

# Trigger on every push to a branch and every pull request. The
# scheduled run gives us a weekly heads-up if a transitive dependency
# (e.g. elapid / rasterio releasing a new wheel) breaks our pinned
# compatible-release ranges before a user reports it.
on:
  push:
    branches: ["**"]
    tags-ignore: ["**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"   # Mondays 05:00 UTC
  workflow_dispatch:

# Cancel an in-flight run for the same branch when a newer push lands —
# avoids wasting matrix minutes on superseded commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------
  # Lint, format, citation-metadata validation.
  # Runs first; fast and OS-independent. Blocking by design — we'd
  # rather fail in 20 seconds than 5 minutes deep into the matrix.
  # -------------------------------------------------------------------
  lint:
    name: Lint + CFF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
      - name: ruff (lint)
        run: ruff check .
      - name: ruff (format check)
        run: ruff format --check .
      - name: Validate CITATION.cff
        uses: dieghernan/cff-validator@v3
        with:
          install-r: false

  # -------------------------------------------------------------------
  # Unit tier — pure-Python logic, no QGIS, no maxent.jar, no Java.
  # Full OS × Python matrix to cover the Windows-specific path quirks
  # called out in § 2.1 of the manuscript (sys.prefix vs sys.executable).
  # -------------------------------------------------------------------
  unit:
    name: Unit (${{ matrix.os }} · Python ${{ matrix.python-version }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
        # Trim the matrix on Windows / macOS to one Python each — these
        # runners cost more minutes and Linux already exercises every
        # version. The Windows row stays in the matrix specifically
        # because of the sys.prefix / qgis-bin.exe handling in
        # core/venv_manager.py that the manuscript flags.
        exclude:
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.11"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt
      - name: Run unit tests
        run: pytest tests/unit -q

  # -------------------------------------------------------------------
  # Regression tier — defends the § 3.3 maxent.jar ↔ QMaxent numerical
  # claims against the golden-values fixture, plus the Bradypus smoke
  # test that exercises the elapid backend end-to-end.
  # Runs on Linux only (smallest matrix that still defends the claim).
  # -------------------------------------------------------------------
  regression:
    name: Regression (Ubuntu · Python 3.12)
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt
      - name: Run regression tests
        run: pytest tests/regression -q

  # -------------------------------------------------------------------
  # Coverage — single representative run, uploaded to Codecov.
  # The OS × Python matrix above is for breadth; this job is for the
  # coverage badge.
  # -------------------------------------------------------------------
  coverage:
    name: Coverage
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt
      - name: Run tests with coverage
        run: pytest --cov --cov-report=xml --cov-report=term-missing
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          # Token is OPTIONAL for public repos; add it as a repo secret
          # CODECOV_TOKEN to silence rate-limit warnings on busy days.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
