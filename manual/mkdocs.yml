site_name: QMaxent Manual
site_url: https://osgeokr.github.io/qmaxent/manual/
site_description: User manual for QMaxent — Maxent species distribution modeling in QGIS.
site_author: Byeong-Hyeok Yu
copyright: "© 2026 Byeong-Hyeok Yu · MIT License"

repo_name: osgeokr/qmaxent
repo_url: https://github.com/osgeokr/qmaxent
edit_uri: edit/main/manual/docs/

theme:
  name: material
  logo: images/logo.png
  favicon: images/logo.png
  language: en
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/qmaxent.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/osgeokr/qmaxent
      name: GitHub repository
    - icon: fontawesome/solid/globe
      link: https://osgeokr.github.io/qmaxent/
      name: Project website

exclude_docs: |
  images/_inbox/

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ko
          name: 한국어
          build: true
          site_name: QMaxent 매뉴얼
          nav_translations:
            Home: 홈
            Getting started: 시작하기
            Introduction: 소개
            Installation: 설치
            Dependencies: 의존성 관리
            Example datasets: 예제 데이터
            Quick start: 빠른 시작
            User guide: 사용 가이드
            The Analysis dock: Analysis 도크
            "① Data tab": "① 데이터 탭"
            "② Parameters tab": "② 파라미터 탭"
            "③ Training tab": "③ 학습 탭"
            "④ Results tab": "④ 결과 탭"
            "⑤ Priority Sites for Survey": "⑤ 우선조사 후보지"
            Saving and reusing models: 모델 저장 및 재사용
            Exporting results: 결과 내보내기
            Examples: 실전 예제
            Overview: 개요
            Reference: 참고
            Methodological background: 방법론 해설
            References: 참고문헌
            FAQ: 자주 묻는 질문

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Getting started:
      - Introduction: introduction.md
      - Installation: installation.md
      - Dependencies: dependencies.md
      - Example datasets: example-datasets.md
      - Quick start: quick-start.md
  - User guide:
      - The Analysis dock: analysis-dock.md
      - "① Data tab": data-tab.md
      - "② Parameters tab": parameters-tab.md
      - "③ Training tab": training-tab.md
      - "④ Results tab": results-tab.md
      - "⑤ Priority Sites for Survey": priority-sites.md
      - Saving and reusing models: saving-models.md
      - Exporting results: exporting-results.md
  - Examples:
      - Overview: examples/index.md
      - "Bradypus variegatus": examples/bradypus.md
      - "Ariolimax": examples/ariolimax.md
      - "Pitta nympha": examples/pitta-nympha.md
  - Reference:
      - Methodological background: methodological-background.md
      - References: references.md
      - FAQ: faq.md
